<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f4f6f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 400px; background: #fff; border-radius: 8px; border: 0.5px solid #dee2e6; padding: 2rem; }
        .login-header { text-align: center; margin-bottom: 1.5rem; }
        .login-header h1 { font-size: 1.5rem; font-weight: 600; color: #212529; }
        .login-header p { color: #6c757d; font-size: 0.9rem; }
        .form-label { font-size: 0.875rem; font-weight: 500; color: #495057; }
        .btn-primary { width: 100%; padding: 0.6rem; font-weight: 500; }
        .divider { text-align: center; color: #6c757d; font-size: 0.85rem; margin: 1rem 0; }
        .register-link { text-align: center; font-size: 0.875rem; color: #6c757d; }
        .register-link a { color: #0d6efd; text-decoration: none; font-weight: 500; }
    </style>
</head>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<body>

    
    <div class="login-card">
        <div class="login-header">
            <h1>Welcome back</h1>
            <p>Sign in to your account</p>
        </div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
 

        <form method="POST" action="/login">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" required autofocus>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary mt-1">Sign in</button>
        </form>

        <div class="divider">— or —</div>
        <div class="register-link">
            Don't have an account? <a href="/register">Create one</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
